<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Mobile Test - CST SmartDesk</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f7;
        }
        .test-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .status {
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            font-weight: 600;
            display: inline-block;
            margin: 8px 0;
        }
        .success { background: #34c759; }
        .error { background: #ff3b30; }
        button {
            background: #007aff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin: 8px 0;
        }
    </style>
</head>
<body>
    <div class="test-card">
        <h1>CST SmartDesk Mobile Test</h1>
        <p>This is a simple test page to verify mobile compatibility.</p>
        <div class="status success">✓ Page Loaded Successfully</div>
        <div class="status success">✓ CSS Styles Applied</div>
        <div class="status success">✓ Mobile Viewport Configured</div>
    </div>

    <div class="test-card">
        <h2>Device Information</h2>
        <p><strong>User Agent:</strong> <span id="userAgent"></span></p>
        <p><strong>Screen Size:</strong> <span id="screenSize"></span></p>
        <p><strong>Viewport Size:</strong> <span id="viewportSize"></span></p>
        <p><strong>Touch Support:</strong> <span id="touchSupport"></span></p>
    </div>

    <div class="test-card">
        <h2>Functionality Test</h2>
        <button onclick="testFunction()">Test Button Click</button>
        <div id="testResult"></div>
    </div>

    <div class="test-card">
        <h2>Navigation</h2>
        <button onclick="window.location.href='/'">Go to Main App</button>
        <button onclick="window.location.reload()">Reload Page</button>
    </div>

    <script>
        // Display device information
        document.getElementById('userAgent').textContent = navigator.userAgent;
        document.getElementById('screenSize').textContent = screen.width + ' x ' + screen.height;
        document.getElementById('viewportSize').textContent = window.innerWidth + ' x ' + window.innerHeight;
        document.getElementById('touchSupport').textContent = 'ontouchstart' in window ? 'Yes' : 'No';

        function testFunction() {
            document.getElementById('testResult').innerHTML = '<div class="status success">✓ JavaScript Working</div>';
        }

        // Log to console for debugging
        console.log('Mobile test page loaded successfully');
        console.log('Device:', navigator.userAgent);
        console.log('Viewport:', window.innerWidth + 'x' + window.innerHeight);
    </script>
</body>
</html>
