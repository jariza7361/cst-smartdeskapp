<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CST SmartDesk</title>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 20px; background: #f5f5f7; }
        .card { background: white; padding: 20px; border-radius: 12px; margin: 16px 0; }
        .btn { background: #007aff; color: white; border: none; padding: 16px; border-radius: 8px; width: 100%; font-size: 16px; }
        .success { color: #34c759; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>CST SmartDesk</h1>
        <p class="success">✓ Page loaded successfully on iPhone!</p>
        <p>This is a simplified version to test iPhone compatibility.</p>
        <button class="btn" onclick="goToMain()">Open Full Application</button>
    </div>
    
    <div class="card">
        <h2>Your Device</h2>
        <p><strong>Browser:</strong> <span id="browser"></span></p>
        <p><strong>Screen:</strong> <span id="screen"></span></p>
    </div>

    <script>
        document.getElementById('browser').textContent = navigator.userAgent.includes('Safari') ? 'Safari' : 'Other';
        document.getElementById('screen').textContent = window.innerWidth + 'x' + window.innerHeight;
        
        function goToMain() {
            window.location.href = '/';
        }
    </script>
</body>
</html>
