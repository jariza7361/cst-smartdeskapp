<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>CST SmartDesk</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
    <script type="module" crossorigin src="/assets/index-FidNCgRY.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-gnYZ-sga.css">
  </head>
  <body>
    <header class="topbar"></header>
    <div class="content"></div>
    <div id="dropzone">Drop files here</div>
    <div id="preview"></div>
    <dialog id="setupWizard">
      <form id="wizardForm" method="dialog">
        <input id="wName" placeholder="First and Last Name" required />
        <input id="wCoach" placeholder="Coach's Name" />
        <input id="wEmpId" placeholder="Employee ID" required />
        <input id="wExt" placeholder="Extension" required />
        <select id="wTheme">
          <option value="light">Light</option>
          <option value="dark">Dark</option>
          <option value="glass">Glass</option>
        </select>
        <select id="wExpertType">
          <option value="bilingual">Bilingual Expert</option>
          <option value="english">English CST Expert</option>
        </select>
        <label>
          <input type="checkbox" id="dontShow" />
          Don't show again
        </label>
        <button id="wizardSave" type="button">Save</button>
      </form>
    </dialog>
    <button id="openSettings">Settings</button>
    <dialog id="testsModal">
      <div>
        <button id="testsClose" type="button">Close</button>
        <button id="testsFetchBtn" type="button">Run Fetch Test</button>
        <pre id="testsOutput"></pre>
      </div>
    </dialog>
    <button id="openTests">Open Tests</button>
    <ul id="statusList"></ul>
    <button id="langToggle">Toggle Language</button>
    <div id="highlightsList"></div>
    <!-- Splash elements -->
    <div id="splash" class="banner overlay" hidden>
      <div class="banner-inner">
        <h2 id="splashTitle">Welcome to CST SmartDesk</h2>
        <div class="banner-body">
          <p id="splashStep">Please wait… loading</p>
          <div class="progress"><div class="bar" id="splashBar"></div></div>
          <div class="pct-row"><span id="splashPct">0%</span></div>
          <div class="banner-actions">
            <button id="splashStart" class="btn-primary">Start</button>
            <button id="splashDismiss" class="btn-quiet">Dismiss</button>
            <button id="splashRetry" class="btn-quiet">Retry</button>
          </div>
        </div>
      </div>
    </div>
    <button id="showWelcome">Show Welcome</button>
    <div id="systemStatus"></div>
  </body>
</html>
