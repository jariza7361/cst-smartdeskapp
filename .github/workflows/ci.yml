name: ci
on: [pull_request, push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci || npm i
      - uses: microsoft/playwright-github-action@v1
        with:
          version: '1.46.1'
      - run: npm run lint
      - run: npm run test
      - run: npm run e2e
