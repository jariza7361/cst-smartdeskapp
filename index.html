<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CST SmartDesk</title>
  <meta name="color-scheme" content="dark light">
  <style>
    :root{
      --bg:#0d0d0f; --ink:#e6e6ea; --muted:#a9b0bd; --border:#2b2b3a;
    }
    html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font:15px/1.45 system-ui,-apple-system,"Segoe UI",Arial,sans-serif}
    header{padding:14px 16px;border-bottom:1px solid var(--border);background:#12121a;position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:10px}
    header .logo{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,#6f4bd8,#9245ff)}
    header .sub{color:var(--muted);font-size:12px}
    main{padding:16px}
    .grid{display:grid;grid-template-columns:220px 1fr;gap:0}
    aside{border-right:1px solid var(--border);padding:12px}
    .nav{list-style:none;margin:0;padding:0}
    .nav li{padding:8px 10px;border-radius:8px;cursor:pointer}
    .nav li:hover{background:#1b1b2a}
    .carrier{display:flex;align-items:center;gap:8px}
    .carrier img{width:18px;height:18px;object-fit:contain}
    /* mobile */
    @media (max-width: 860px){
      .grid{grid-template-columns:1fr}
      aside{display:none}
    }
    /* floating status + tester is added by app.js */
  </style>
</head>
<body>
  <header>
    <div class="logo"></div>
    <div><strong>CST SmartDesk</strong> <span class="sub">Escalation Toolkit</span></div>
  </header>

  <div class="grid">
    <aside>
      <div style="font-size:12px;color:var(--muted);margin:6px 6px 8px">Carrier Hub</div>
      <ul class="nav" id="carrierNav">
        <li class="carrier" data-open="carrier:VZW"><img alt="Verizon" src="/logos/verizon.svg"><span>Verizon</span></li>
        <li class="carrier" data-open="carrier:ATT"><img alt="AT&T" src="/logos/att.svg"><span>AT&amp;T</span></li>
        <li class="carrier" data-open="carrier:CRK"><img alt="Cricket" src="/logos/cricket.svg"><span>Cricket</span></li>
        <li class="carrier" data-open="carrier:USC"><img alt="US Cellular" src="/logos/uscellular.svg"><span>US Cellular</span></li>
        <li class="carrier" data-open="carrier:COX"><img alt="Cox" src="/logos/cox.svg"><span>Cox</span></li>
        <li class="carrier" data-open="carrier:OPT"><img alt="Optimum" src="/logos/optimum.svg"><span>Optimum</span></li>
        <li class="carrier" data-open="carrier:CSC"><img alt="Consumer Cellular" src="/logos/consumercellular.svg"><span>Consumer Cellular</span></li>
      </ul>
    </aside>

    <main>
      <h2 style="margin:0 0 10px">Welcome<span id="welcomeName"></span> 👋</h2>
      <p style="margin-top:0;color:var(--muted)">Mobile‑friendly baseline. Use the “Test Verizon T&amp;C” button in the lower‑right to verify serverless fetch.</p>

      <!-- Setup trigger -->
      <button id="openSetup" style="background:#2a2a3c;color:var(--ink);border:1px solid var(--border);border-radius:10px;padding:8px 10px;cursor:pointer">
        Open Setup
      </button>
    </main>
  </div>

  <!-- Minimal Setup Modal preserved -->
  <dialog id="setupDialog">
    <form method="dialog" style="min-width: min(520px, 92vw);background:#171722;border:1px solid var(--border);border-radius:14px;color:var(--ink);padding:14px">
      <h3 style="margin:0 0 10px">First‑Time Setup</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <label>First Name <input id="f_first" required style="width:100%"></label>
        <label>Last Name <input id="f_last" required style="width:100%"></label>
        <label>Employee ID <input id="f_id" required style="width:100%"></label>
        <label>Extension <input id="f_ext" required maxlength="5" style="width:100%"></label>
      </div>
      <div style="margin-top:10px;display:flex;gap:8px;justify-content:flex-end">
        <button value="cancel" style="background:transparent;border:1px solid var(--border);color:var(--ink);border-radius:8px;padding:6px 10px">Cancel</button>
        <button id="saveProfile" value="default" style="background:#6f4bd8;border:none;color:#fff;border-radius:8px;padding:6px 10px;cursor:pointer">Save</button>
      </div>
    </form>
  </dialog>

  <!-- IMPORTANT: on Vercel, /public/app.js is served as /app.js -->
  <script src="/app.js" defer></script>
</body>
</html>
