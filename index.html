<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CST SmartDesk</title>
  <meta name="color-scheme" content="dark light" />
  <style>
    :root{
      --bg:#0d0f14; --panel:#0f172a; --panel-2:#0b1222; --ink:#e6eaff; --muted:#9aa7c7;
      --accent:#6f4bd8; --ok:#00d48a; --warn:#ffb020; --danger:#ff5d5d;
      --border:#24304b; --tile:#101a33; --tile-hover:#0f1a38;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font:15px/1.4 system-ui,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--ink)}

    header{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;height:56px;padding:0 12px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#0b1222,#0b1222ee)}
    .brand{display:flex;gap:10px;align-items:center;font-weight:600}
    .logo{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,var(--accent),#9245ff)}
    .actions{display:flex;gap:8px;align-items:center}
    .pill{display:flex;gap:8px;align-items:center;border:1px solid var(--border);background:var(--panel-2);border-radius:999px;padding:6px 10px}
    button{cursor:pointer;border:1px solid var(--border);background:var(--panel);color:var(--ink);padding:8px 12px;border-radius:10px}
    button.primary{background:var(--accent);border-color:#6940d9;color:white}
    button.ghost{background:transparent}
    select,input,textarea{width:100%;border:1px solid var(--border);background:var(--panel-2);color:var(--ink);border-radius:10px;padding:10px}
    textarea{min-height:120px}

    main{max-width:1100px;margin:16px auto;padding:0 12px;display:grid;gap:14px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px}
    .muted{color:var(--muted)}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .list{max-height:240px;overflow:auto;border:1px dashed var(--border);border-radius:10px;padding:10px}

    /* ===== Mobile tweaks ===== */
    @media (max-width: 640px) {
      header { flex-wrap: wrap; gap: 8px }
      main { padding: 0 10px }
      .grid { grid-template-columns:1fr }
      .card { padding: 12px; border-radius: 12px }
      h2 { font-size: 16px }
      label { font-size: 12px }
      button, select, input[type="text"], textarea { font-size: 16px; } /* prevent iOS zoom */
      .row { gap: 8px }
      .list { max-height: 200px }
      #dropText::after { content: ' (use the file picker on mobile)'; font-size: 12px; color: var(--muted); }
      details.mobile-collapse > summary {
        list-style: none; cursor: pointer; user-select: none;
        padding: 10px; margin-bottom: 8px; border: 1px solid var(--border);
        border-radius: 10px; background: #0e1423;
      }
      details.mobile-collapse > summary::-webkit-details-marker { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand"><div class="logo"></div><div>CST SmartDesk</div></div>
    <div class="actions">
      <div class="pill"><span id="uiLang">EN</span><button id="toggleLang" class="ghost">Toggle</button></div>
      <button id="openSettings" class="ghost">Settings</button>
      <button id="openProfile" class="ghost">Profile</button>
    </div>
  </header>

  <main>
    <section class="grid">
      <!-- Copilot -->
      <article class="card">
        <h2>🤖 Copilot Assistant</h2>
        <label>Paste Expert Chat</label>
        <textarea id="cp_in" placeholder="Paste chat (phone, zip, model, carrier, concern)…"></textarea>
        <div class="row" style="margin-top:8px">
          <button id="cp_run" class="primary">Generate</button>
          <button id="cp_suggest">Suggest</button>
        </div>
      </article>

      <!-- SmartDrop -->
      <article class="card">
        <h2>📥 SmartDrop Upload</h2>
        <p class="muted" id="dropSub">Drag & drop files here or use the picker.</p>
        <input id="picker" type="file" multiple accept=".pdf,.doc,.docx,.eml,.xlsx,.xls,.ppt,.pptx,.png,.jpg,.jpeg,.txt" />
        <div id="dropZone" class="list" style="margin-top:8px"><em id="dropText">Drop files</em></div>
        <label style="margin-top:10px">Routing Note</label>
        <textarea id="sd_note" placeholder="e.g., Update Carrier > AT&amp;T"></textarea>
        <div class="row" style="margin-top:8px">
          <button id="sd_process" class="primary">Process</button>
          <button id="sd_clear">Clear</button>
        </div>
      </article>
    </section>

    <!-- Output (collapsible on mobile) -->
    <section class="card">
      <h2 id="out_title" class="mobile-hide">Output</h2>
      <details id="outWrap" class="mobile-collapse" open>
        <summary id="outSummary" class="muted">Output (tap to expand)</summary>
        <pre id="out" class="list" style="min-height:120px;white-space:pre-wrap">{}</pre>
      </details>
    </section>
  </main>

  <script src="/app.js" defer></script>
</body>
</html>
